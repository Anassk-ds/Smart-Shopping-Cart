<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Shopping Cart</title>
    <style>
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#eef2f7;
    padding:20px;
}

header{
    background:#2563eb;
    color:white;
    text-align:center;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
}

.controls{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:20px;
}

input,select,button{
    padding:10px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:16px;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:white;
    padding:15px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
}

.card button{
    width:100%;
    margin-top:10px;
}

table{
    width:100%;
    background:white;
    border-collapse:collapse;
    margin-top:20px;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}

.summary{
    margin-top:20px;
    font-size:18px;
}

#invoice{
    margin-top:20px;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
}
    </style>
</head>
<body>

<header>
    <h1>🛒 Smart Shopping Cart</h1>
</header>

<section class="controls">

    <input
        type="text"
        id="search"
        placeholder="Search Product..."
    >

    <select id="category">
        <option value="All">All Categories</option>
        <option value="Electronics">Electronics</option>
        <option value="Stationery">Stationery</option>
        <option value="Accessories">Accessories</option>
    </select>

</section>

<h2>Products</h2>

<div id="productContainer" class="products"></div>

<hr>

<h2>Shopping Cart</h2>

<table>
    <thead>
        <tr>
            <th>Product</th>
            <th>Price</th>
            <th>Qty</th>
            <th>Total</th>
            <th>Action</th>
        </tr>
    </thead>

    <tbody id="cartBody">

    </tbody>
</table>

<div class="summary">

    <h3>Total Items:
        <span id="totalItems">0</span>
    </h3>

    <h3>Total Price:
        ₹<span id="totalPrice">0</span>
    </h3>

</div>

<hr>

<h2>Coupon</h2>

<input
type="text"
id="coupon"
placeholder="Enter Coupon">

<button id="applyCoupon">
Apply Coupon
</button>

<p id="couponMsg"></p>

<hr>

<h2>Checkout</h2>

<input
type="text"
id="customerName"
placeholder="Customer Name">

<button id="checkoutBtn">
Checkout
</button>

<div id="invoice"></div>

<script src="script.js"></script>

</body>
  </html>
