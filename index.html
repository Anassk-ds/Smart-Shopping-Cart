<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Shopping Cart</title>
<style>
  :root {
    --border: #ddd;
    --accent: #2a6f4f;
    --danger: #b3372c;
    --bg: #fafafa;
  }
  * { box-sizing: border-box; }
  body {
    font-family: Arial, Helvetica, sans-serif;
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: #222;
  }
  header {
    background: var(--accent);
    color: white;
    padding: 14px 20px;
  }
  header h1 { margin: 0; font-size: 1.4rem; }
  main {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 20px;
    padding: 20px;
    max-width: 1200px;
    margin: 0 auto;
  }
  @media (max-width: 800px) {
    main { grid-template-columns: 1fr; }
  }
  section.panel {
    background: white;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px;
  }
  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }
  input[type="text"], select {
    padding: 8px;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 0.95rem;
  }
  #searchInput { flex: 1; min-width: 160px; }
  .category-btns button {
    padding: 6px 12px;
    border: 1px solid var(--border);
    background: white;
    border-radius: 4px;
    cursor: pointer;
  }
  .category-btns button.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  #productGrid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
  }
  .product-card {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px;
    text-align: center;
    background: #fff;
  }
  .product-card h3 { margin: 6px 0 2px; font-size: 1rem; }
  .product-card .cat { color: #777; font-size: 0.8rem; margin-bottom: 4px; }
  .product-card .price { font-weight: bold; margin-bottom: 8px; }
  .product-card button {
    width: 100%;
    padding: 6px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
  }
  .product-card button:hover { opacity: 0.9; }
  #noResults { color: #777; padding: 10px; }

  table { width: 100%; border-collapse: collapse; margin-bottom: 12px; }
  th, td { padding: 6px 4px; border-bottom: 1px solid var(--border); font-size: 0.9rem; text-align: left; }
  td.qty-controls { white-space: nowrap; }
  td.qty-controls button {
    width: 24px; height: 24px; border: 1px solid var(--border);
    background: #fff; border-radius: 4px; cursor: pointer;
  }
  td.qty-controls span { display: inline-block; width: 24px; text-align: center; }
  .remove-btn { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 1rem; }

  .summary-row { display: flex; justify-content: space-between; margin: 4px 0; }
  .summary-row.total { font-weight: bold; font-size: 1.1rem; border-top: 1px solid var(--border); padding-top: 6px; }

  .coupon-row { display: flex; gap: 8px; margin: 10px 0; }
  #couponMsg { font-size: 0.85rem; margin-top: -4px; margin-bottom: 8px; }
  #couponMsg.error { color: var(--danger); }
  #couponMsg.success { color: var(--accent); }

  #checkoutBtn, #closeInvoiceBtn {
    width: 100%; padding: 10px; background: var(--accent); color: white;
    border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; margin-top: 6px;
  }
  #checkoutBtn:disabled { background: #aaa; cursor: not-allowed; }

  #invoiceOverlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    align-items: center; justify-content: center; padding: 20px;
  }
  #invoiceOverlay.show { display: flex; }
  #invoiceBox {
    background: white; border-radius: 8px; padding: 24px; max-width: 480px; width: 100%;
    max-height: 90vh; overflow-y: auto;
  }
  #invoiceBox h2 { margin-top: 0; color: var(--accent); }
  #invoiceBox table th, #invoiceBox table td { font-size: 0.85rem; }
  .success-banner {
    background: #e6f4ea; color: var(--accent); padding: 8px; border-radius: 4px;
    text-align: center; margin-bottom: 12px; font-weight: bold;
  }
</style>
</head>
<body>

<header>
  <h1>🛒 Smart Shopping Cart</h1>
</header>

<main>
  <!-- Catalog Panel -->
  <section class="panel" id="catalogPanel">
    <div class="controls">
      <input type="text" id="searchInput" placeholder="Search products by name...">
    </div>
    <div class="controls category-btns" id="categoryButtons"></div>
    <div id="productGrid"></div>
    <div id="noResults" style="display:none;">No products match your search/filter.</div>
  </section>

  <!-- Cart Panel -->
  <section class="panel" id="cartPanel">
    <h2>Your Cart</h2>
    <table id="cartTable">
      <thead>
        <tr><th>Product</th><th>Price</th><th>Qty</th><th>Subtotal</th><th></th></tr>
      </thead>
      <tbody id="cartBody"></tbody>
    </table>
    <div id="emptyCartMsg" style="display:none; color:#777;">Your cart is empty.</div>

    <div class="summary-row"><span>Total Items:</span><span id="totalItems">0</span></div>
    <div class="summary-row"><span>Subtotal:</span><span id="subtotalPrice">₹0.00</span></div>

    <div class="coupon-row">
      <input type="text" id="couponInput" placeholder="Coupon code">
      <button id="applyCouponBtn" style="padding:8px 12px; border-radius:4px; border:1px solid var(--border); cursor:pointer;">Apply</button>
    </div>
    <div id="couponMsg"></div>

    <div class="summary-row"><span>Discount:</span><span id="discountAmount">-₹0.00</span></div>
    <div class="summary-row"><span>GST (5%):</span><span id="gstAmount">₹0.00</span></div>
    <div class="summary-row total"><span>Grand Total:</span><span id="grandTotal">₹0.00</span></div>

    <label for="customerName" style="display:block; margin-top:10px; font-size:0.9rem;">Customer Name</label>
    <input type="text" id="customerName" placeholder="Enter your name" style="width:100%;">

    <button id="checkoutBtn">Checkout</button>
  </section>
</main>

<!-- Invoice Modal -->
<div id="invoiceOverlay">
  <div id="invoiceBox">
    <div class="success-banner">✅ Order placed successfully!</div>
    <h2>Invoice</h2>
    <div id="invoiceDetails"></div>
    <button id="closeInvoiceBtn">Close</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
