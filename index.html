<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Shopping Cart</title>
    <style>
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    padding:20px;
    background:#f5f5f5;
}

header{
    text-align:center;
    margin-bottom:20px;
}

.controls{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

input,
select,
button{
    padding:10px;
    font-size:16px;
}

button{
    cursor:pointer;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:15px;
}

.card{
    background:#fff;
    border:1px solid #ccc;
    padding:15px;
    border-radius:8px;
}

.card h3{
    margin-bottom:10px;
}

.card p{
    margin:5px 0;
}

.card button{
    width:100%;
    margin-top:10px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
    background:#fff;
}

table,
th,
td{
    border:1px solid #ccc;
}

th,
td{
    padding:10px;
    text-align:center;
}

.summary{
    margin-top:20px;
}

.summary h3{
    margin:8px 0;
}

#couponMsg{
    margin-top:10px;
    font-weight:bold;
}
#invoice{
    margin-top:20px;
    background:#fff;
    padding:20px;
    border:1px solid #ccc;
    white-space:pre-wrap;
}
    </style>
</head>
<body>

<header>
    <h1>🛒 Smart Shopping Cart</h1>
</header>

<section class="controls">

    <input
        type="text"
        id="search"
        placeholder="Search Product..."
    >

    <select id="category">
        <option value="All">All Categories</option>
        <option value="Electronics">Electronics</option>
        <option value="Stationery">Stationery</option>
        <option value="Accessories">Accessories</option>
    </select>

</section>

<h2>Products</h2>

<div id="productContainer" class="products"></div>

<hr>

<h2>Shopping Cart</h2>

<table>
    <thead>
        <tr>
            <th>Product</th>
            <th>Price</th>
            <th>Qty</th>
            <th>Total</th>
            <th>Action</th>
        </tr>
    </thead>

    <tbody id="cartBody">

    </tbody>
</table>

<div class="summary">

    <h3>Total Items:
        <span id="totalItems">0</span>
    </h3>

    <h3>Total Price:
        ₹<span id="totalPrice">0</span>
    </h3>

</div>

<hr>

<h2>Coupon</h2>

<input
type="text"
id="coupon"
placeholder="Enter Coupon">

<button id="applyCoupon">
Apply Coupon
</button>

<p id="couponMsg"></p>

<hr>

<h2>Checkout</h2>

<input
type="text"
id="customerName"
placeholder="Customer Name">

<button id="checkoutBtn">
Checkout
</button>

<div id="invoice"></div>

<script src="script.js"></script>

</body>
  </html>
